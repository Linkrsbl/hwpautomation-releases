<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HWP Automation App - 로그인 완료</title>
  <style>
    :root {
      --primary: #0b57d0;
      --primary-soft: #e8f0fe;
      --surface: #ffffff;
      --background: #f6f8fb;
      --text-main: #1f1f1f;
      --text-muted: #5f6368;
      --border: #dfe3ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, #edf4ff 0%, transparent 35%),
        linear-gradient(180deg, #fbfcff 0%, var(--background) 100%);
      color: var(--text-main);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
    }

    .card {
      width: min(100%, 500px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(11, 87, 208, 0.08);
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      background: var(--primary-soft);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-muted);
    }

    .status {
      margin-top: 18px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status strong {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M19.916 4.352c1.084 1.107 1.066 3.125-.04 4.195l-8.625 8.35a2.536 2.536 0 0 1-3.522 0l-3.32-3.153a2.646 2.646 0 0 1-.035-3.834 2.872 2.872 0 0 1 3.992-.033l1.523 1.446 6.837-6.618a2.885 2.885 0 0 1 3.19-.353z" fill="currentColor"/>
      </svg>
    </div>
    <h1>로그인이 완료되었습니다</h1>
    <p id="message">잠시 후 HWP Automation 앱으로 돌아갑니다.</p>
    <p class="status" id="status">앱이 자동으로 열리지 않으면 잠시 후 직접 앱으로 돌아가 주세요.</p>
  </main>

  <script>
    (function () {
      const hash = window.location.hash;
      const messageEl = document.getElementById('message');
      const statusEl = document.getElementById('status');

      if (!hash || !hash.includes('access_token')) {
        messageEl.textContent = '인증 정보가 확인되지 않았습니다.';
        statusEl.textContent = '앱에서 다시 로그인을 시도해 주세요.';
        return;
      }

      history.replaceState(null, '', window.location.pathname);
      messageEl.textContent = '앱을 여는 중입니다.';
      statusEl.innerHTML = '<strong>자동 복귀 시도 중...</strong>';

      const deepLinkUrl = `hwpapp://callback${hash}`;
      window.location.replace(deepLinkUrl);

      setTimeout(() => {
        messageEl.textContent = '앱을 자동으로 열지 못했습니다.';
        statusEl.textContent = 'HWP Automation 앱을 직접 열면 로그인 상태가 반영될 수 있습니다.';
      }, 1200);
    })();
  </script>
</body>
</html>
